<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>重置密码</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: #eef3f8;
            color: #1f2937;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at top, #f6fbff 0%, #eef3f8 60%, #e2eaf5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            width: min(100%, 1200px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 宽度540不变，缩小上下padding降低整体高度 */
        .reset-box {
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            padding: 28px 40px; /* 原48上下 → 28，减小高度 */
            width: 540px;
            max-width: 100%;
        }
        h2 {
            text-align: center;
            margin-bottom: 24px; /* 原40 → 缩小间距 */
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            color: #0f4a8a;
            line-height: 1.2;
        }
        .form-item {
            margin-bottom: 12px; /* 输入框间距缩小 */
        }
        label {
            display: block;
            margin: 12px 0 6px; /* 原20→12，压缩上下距离 */
            font-weight: 700;
            color: #334155;
            font-size: 1.05rem;
        }
        input {
            width: 100%;
            padding: 14px 18px; /* 输入框高度略减小 */
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            background: #f8fafc;
            font-size: 1rem;
            color: #0f172a;
        }
        input:focus {
            outline: none;
            border-color: #0f4a8a;
            box-shadow: 0 0 0 4px rgba(15, 74, 138, 0.12);
        }
        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 14px 20px; /* 按钮高度缩小 */
            font-size: 1rem;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
            background: linear-gradient(135deg, #0f4a8a 0%, #2c7be5 100%);
            color: #fff;
            margin-top: 16px; /* 原22缩小 */
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 30px rgba(15, 74, 138, 0.15);
        }
        .back-login {
            text-align: center;
            margin-top: 18px; /* 原24缩小 */
            font-size: 1rem;
        }
        a {
            color: #2c7be5;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 600;
        }
        .tip {
            text-align: center;
            margin: 8px 0;
        }
        .success {
            color: green;
        }
        .error {
            color: #b91c1c;
            font-weight: 600;
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 40px;
        }
        /* 新增全局提示弹窗样式 */
        .global-tip-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            z-index: 9999;
            justify-content: center;
        }
        .global-tip-box {
            background: #fff;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reset-box">
            <h2>重置登录密码</h2>
            <p class="tip error" id="errTip"></p>
            <form id="resetForm">
                <div class="form-item">
                    <label>注册手机号（账号）</label>
                    <input type="text" name="account" id="inpAccount" placeholder="输入11位注册手机号" required maxlength="11">
                </div>
                <div class="form-item">
                    <label>新密码</label>
                    <input type="password" name="new_pwd" id="inpNewPwd" placeholder="设置新登录密码" required>
                </div>
                <div class="form-item">
                    <label>确认新密码</label>
                    <input type="password" name="confirm_pwd" id="inpConfirmPwd" placeholder="再次输入新密码" required>
                </div>
                <button class="submit-btn" type="submit">确认重置密码</button>
            </form>
            <div class="back-login">
                <a href="/login">返回登录</a>
            </div>
        </div>
        <div class="footer">Powered by AI 起名引擎 · 兼顾传统文化与现代美学</div>
    </div>

<!-- 全局弹窗提示 -->
<div class="global-tip-mask" id="tipMask">
    <div class="global-tip-box" id="tipText"></div>
</div>

<script>
const form = document.getElementById('resetForm');
const errTip = document.getElementById('errTip');
const tipMask = document.getElementById('tipMask');
const tipText = document.getElementById('tipText');

// 显示弹窗
function showTip(msg) {
    tipText.innerText = msg;
    tipMask.style.display = 'flex';
}
// 关闭弹窗
function hideTip() {
    tipMask.style.display = 'none';
}

form.addEventListener('submit', async function(e) {
    // 阻止表单原生跳转
    e.preventDefault();
    errTip.innerText = '';
    // 获取输入值
    const account = document.getElementById('inpAccount').value.trim();
    const new_pwd = document.getElementById('inpNewPwd').value.trim();
    const confirm_pwd = document.getElementById('inpConfirmPwd').value.trim();

    try {
        const res = await fetch('/api/reset_pwd', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: new URLSearchParams({
                account,
                new_pwd,
                confirm_pwd
            })
        })
        const data = await res.json();
        if(data.code === 200) {
            // 修改成功弹窗
            showTip("修改成功");
            // 0.5秒后关闭弹窗并跳转登录页
            setTimeout(() => {
                hideTip();
                window.location.href = "/login";
            }, 500);
        } else {
            // 失败页面文字提示
            errTip.innerText = data.msg;
        }
    } catch(err) {
        errTip.innerText = "网络请求异常，请重试";
        console.error(err);
    }
})
</script>
</body>
</html>
