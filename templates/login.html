<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - AI新生儿智能起名系统</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: #eef3f8;
            color: #1f2937;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at top, #f6fbff 0%, #eef3f8 60%, #e2eaf5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            width: min(100%, 1200px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            padding: 48px 40px;
            max-width: 780px;
            width: 100%;
        }
        .header-text {
            text-align: center;
            margin-bottom: 40px;
        }
        .header-text h1 {
            margin: 0;
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            color: #0f4a8a;
            line-height: 1.2;
        }
        label {
            display: block;
            margin: 20px 0 8px;
            font-weight: 700;
            color: #334155;
            font-size: 1.05rem;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            background: #f8fafc;
            font-size: 1rem;
            color: #0f172a;
        }
        input:focus {
            outline: none;
            border-color: #0f4a8a;
            box-shadow: 0 0 0 4px rgba(15, 74, 138, 0.12);
        }
        .two-btn-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 30px;
        }
        button {
            border: none;
            border-radius: 999px;
            padding: 16px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .btn-login {
            background: linear-gradient(135deg, #0f4a8a 0%, #2c7be5 100%);
            color: #fff;
        }
        .btn-guest {
            background: #ffffff;
            color: #0f4a8a;
            border: 1px solid #0f4a8a;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 18px 30px rgba(15, 74, 138, 0.15); }
        .tip-desc {
            text-align: center;
            color: #475569;
            margin: 24px 0 0;
            font-size: 1rem;
        }
        .tip-link {
            color: #2c7be5;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 600;
        }
        .error {
            color: #b91c1c;
            margin: 16px 0;
            font-weight: 600;
            text-align: center;
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 40px;
        }
        /* ========== 复制login1.html完整弹窗样式 ========== */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            background: #fff;
            width: min(90%, 420px);
            border-radius: 20px;
            padding: 32px 28px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(15,23,42,0.15);
        }
        .modal-text {
            font-size: 1.05rem;
            color: #1f2937;
            line-height: 1.6;
            margin-bottom: 28px;
            white-space: nowrap;
        }
        .modal-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .modal-confirm {
            background: linear-gradient(135deg, #0f4a8a 0%, #2c7be5 100%);
            color: #fff;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 999px;
            font-size: 1rem;
            cursor: pointer;
        }
        .modal-cancel {
            background: #ffffff;
            color: #0f4a8a;
            border: 1px solid #0f4a8a;
            width: 100%;
            padding: 14px;
            border-radius: 999px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header-text">
                <h1>AI 新生儿智能起名系统</h1>
            </div>
            <div class="error" id="msgTip"></div>
            <label>登录账号（注册时填写的11位手机号）</label>
            <input type="text" id="loginAccount" placeholder="输入11位手机号账号">
            <label>密码</label>
            <input type="password" id="loginPwd" placeholder="输入密码">
            <div class="two-btn-wrap">
                <button class="btn-guest" onclick="goGuest()">游客访问</button>
                <button class="btn-login" onclick="doLogin()">登录</button>
            </div>
            <p class="tip-desc">
                <span class="tip-link" onclick="jumpRegister()">注册</span>账号后即可使用智能起名，收藏名字功能
            </p>
        </div>
        <div class="footer">Powered by AI 起名引擎 · 兼顾传统文化与现代美学</div>
    </div>
    <!-- 复制login1.html弹窗DOM结构 -->
    <div class="modal-mask" id="modalMask">
        <div class="modal-box">
            <p class="modal-text" id="modalMsg"></p>
            <div class="modal-btn-group">
                <button class="modal-cancel" onclick="closeModal()">取消</button>
                <button class="modal-confirm" onclick="confirmGuest()">确定</button>
            </div>
        </div>
    </div>
<script>
    // 弹窗配套函数（复制login1.html）
    function showModalTip(text) {
        document.getElementById('modalMsg').textContent = text;
        document.getElementById('modalMask').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('modalMask').style.display = 'none';
    }
    function confirmGuest() {
        window.location.href = "/tourist";
    }

    function setTip(text) {
        document.getElementById('msgTip').textContent = text;
    }
    function jumpRegister() {
        window.location.href = "/register";
    }
    // 替换原alert为自定义弹窗
    function goGuest() {
        showModalTip("游客访问仅支持基础起名，无法使用名字收藏功能");
    }
    // 登录请求（完全未改动）
    async function doLogin() {
        const account = document.getElementById('loginAccount').value.trim();
        const pwd = document.getElementById('loginPwd').value.trim();
        setTip('');
        if (!account || !pwd) return setTip("账号密码不能为空");
        const reg = /^\d{11}$/;
        if (!reg.test(account)) return setTip("账号必须是11位纯数字手机号");
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({account: account, password: pwd})
        })
        const data = await res.json();
        if(data.code !== 200) return setTip(data.msg);
        // 登录存储
        localStorage.setItem("isLogin", "1");
        localStorage.setItem("loginUid", data.user_id);
        localStorage.setItem("loginName", data.username);
        localStorage.setItem("loginAccount", data.account);
        window.location.href = "/index";
    }
    window.onload = function () {
        if(localStorage.getItem("isLogin") === "1"){
            window.location.href = "/index";
        }
    }
</script>
</body>
</html>
