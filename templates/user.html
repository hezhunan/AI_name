<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人中心 - AI新生儿智能起名系统</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "PingFang SC", "Helvetica Neue", sans-serif;
            background: #eef3f8;
            color: #1f2937;
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: radial-gradient(circle at top, #f6fbff 0%, #eef3f8 60%, #e2eaf5 100%); }
        .container { width: min(100%, 1100px); margin: 0 auto; padding: 24px; }
        .header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 28px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            margin-bottom: 24px;
        }
        .header-card h1 {
            margin: 0;
            color: #0f4a8a;
            font-size: clamp(1.5rem, 2.5vw, 2.5rem);
        }
        .content-box {
            display: flex;
            gap: 20px;
        }
        .back-text {
            font-size: 0.8rem;
            color: #0f4a8a;
            cursor: pointer;
            font-weight: 600;
        }
        .back-text:hover {
            text-decoration: underline;
            color: #2c7be5;
        }
        .grid {
            display: grid;
        }
        .card {
            background: #ffffff;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .card h2 {
            margin: 0;
            color: #0f4a8a;
            font-size: 1.4rem;
        }
        .edit-btn {
            padding: 8px 18px;
            border: 1px solid #0f4a8a;
            background: #fff;
            color: #0f4a8a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .edit-btn.active {
            background: #0f4a8a;
            color: #fff;
        }
        .batch-del-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: #b91c1c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            font-size: 1rem;
        }
        .item-list {
            padding-left: 0;
            list-style: none;
        }
        .item-list li {
            padding: 12px 16px;
            background: #f8fbff;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .history-item-li {
            cursor: pointer;
            transition: 0.2s;
        }
        .history-item-li:hover {
            background: #eef2ff;
        }
        .item-checkbox {
            width: 18px;
            height: 18px;
            display: none;
        }
        .empty-tip {
            color: #64748b;
            text-align: center;
            padding: 30px 0;
            font-size: 1.05rem;
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 80px;
        }
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.55);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            width: min(80%, 260px);
            background: white;
            padding:20px 18px;
            border-radius:16px;
        }
        .modal-title{text-align:center;font-weight:bold;margin-bottom:12px}
        .modal-desc{text-align:center;color:#555}
        .modal-btn-row{display:flex;gap:12;margin-top:20px}
        .modal-cancel-btn{flex:1;padding:10;border:none;border-radius:999px;background:#eee}
        .modal-sure-btn{flex:1;padding:10;border:none;border-radius:999px;background:#2c7be5;color:#fff}
        .history-modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .history-modal-box {
            background: #fff;
            width: min(100%, 820px);
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 32px;
        }
        .history-modal-close {
            margin-top: 24px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            padding:8px 40px;border:none;border-radius:999px;background:#2c7be5;color:#fff
        }
        .info-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin: 16px 0;
        }
        .tag {
            background: #eef2ff;
            color: #3730a3;
            border-radius: 999px;
            padding: 10px 16px;
            text-align: center;
        }
        .suggestion {
            padding: 18px;
            background: #f8fbff;
            border-left: 4px solid #2c7be5;
            border-radius: 16px;
            margin: 12px 0;
        }
        .suggestion h3 {
            margin: 0 0 8px;
            color: #0f172a;
        }
        .meta {
            color: #475569;
            line-height: 1.6;
            margin: 6px 0;
        }
        .list {
            padding-left: 18px;
            color: #334155;
        }
        .list li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="modal-mask" id="confirmModal">
        <div class="modal-box">
            <h3 class="modal-title">提示</h3>
            <p class="modal-desc" id="confirmText">确定删除选中的1条收藏？删除后无法恢复</p>
            <div class="modal-btn-row">
                <button class="modal-cancel-btn" onclick="closeConfirmModal()">取消</button>
                <button class="modal-sure-btn" onclick="executeDelete()">确定</button>
            </div>
        </div>
    </div>
    <div class="modal-mask" id="tipModal">
        <div class="modal-box">
            <h3 class="modal-title">提示</h3>
            <p class="modal-desc" id="tipText">删除收藏成功！</p>
            <div class="modal-btn-row" style="justify-content:center">
                <button class="modal-sure-btn" onclick="closeTip()">知道了</button>
            </div>
        </div>
    </div>
    <div class="history-modal-mask" id="historyDetailModal">
        <div class="history-modal-box">
            <div id="historyModalContent"></div>
            <button class="history-modal-close" onclick="closeHistoryModal()">关闭</button>
        </div>
    </div>
    <div class="container">
        <div class="header-card">
            <h1 id="pageTitle">个人中心</h1>
            <div class="content-box">
                <span class="back-text" onclick="goHomePage()">返回首页</span>
                <span class="back-text" onclick="logout()">退出登录</span>
            </div>
        </div>
        <div class="grid">
            <div class="card">
                <div class="card-head">
                    <h2>我的收藏名字</h2>
                    <button class="edit-btn" id="editCollectBtn" onclick="toggleEditMode()">编辑</button>
                </div>
                <ul class="item-list" id="collectBox"></ul>
                <button class="batch-del-btn" id="batchDelBtn" onclick="openConfirmDialog()">批量删除</button>
            </div>
            <div class="card">
                <h2>我的起名浏览记录（点击查看详情）</h2>
                <ul class="item-list" id="historyBox"></ul>
            </div>
        </div>
        <div class="footer">Powered by AI 起名引擎 · 传统文化起名系统</div>
    </div>
<script>
let editMode = false;
let deleteTargetIdList = [];
let allCollectData = [];
let allHistoryData = [];
const loginUid = localStorage.getItem("loginUid");
window.onload = async function () {
    const path = window.location.pathname;
    const whiteList = ['/login','/register','/tourist'];
    if(!whiteList.includes(path) && localStorage.getItem('isLogin') !== '1'){
        window.location.href = '/login';
    }
    const nickMap = JSON.parse(localStorage.getItem('userNickMap') || '{}');
    const acc = localStorage.getItem('loginAccount');
    document.getElementById('pageTitle').textContent = (nickMap[acc] || "用户") + " 的个人中心";
    if(!loginUid){
        alert("登录失效");location.href="/login";return;
    }
    await loadCollectData();
    await loadHistoryData();
}
function goHomePage(){location.href="/index"}
function logout(){
    localStorage.clear();
    document.cookie="loginUid=;expires=0;path=/;isLogin=;expires=0;path=/";
    location.href="/login";
}
function toggleEditMode(){
    editMode = !editMode;
    const btn = document.getElementById("editCollectBtn");
    const delBtn = document.getElementById("batchDelBtn");
    const checks = document.querySelectorAll(".item-checkbox");
    if(editMode){
        btn.innerText="完成";btn.classList.add("active");
        delBtn.style.display="block";
        checks.forEach(c=>c.style.display="block")
    }else{
        btn.innerText="编辑";btn.classList.remove("active");
        delBtn.style.display="none";
        checks.forEach(c=>{c.style.display="none";c.checked=false})
    }
}
async function loadCollectData(){
    const res = await fetch("/api/collect/list",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:parseInt(loginUid)})
    })
    const json = await res.json();
    allCollectData = json.data;
    renderCollectList();
}
// 已修改：新增释义展示
function renderCollectList(){
    const wrap = document.getElementById("collectBox");
    const editBtn = document.getElementById("editCollectBtn");
    if(allCollectData.length===0){
        wrap.innerHTML="<div class='empty-tip'>暂无收藏</div>";
        editBtn.style.display="none";return;
    }
    editBtn.style.display="block";
    let html = "";
    allCollectData.forEach(item=>{
        html += `<li style="flex-direction:column;align-items:flex-start;gap:8px;">
        <div style="display:flex;align-items:center;gap:12px;">
            <input class="item-checkbox" data-id="${item.id}" type="checkbox">
            <span>名字：${item.full_name} 五行：${item.five_attr}</span>
        </div>
        <div style="color:#475569;line-height:1.6;">
            释义：${item.meaning}
        </div>
        </li>`
    })
    wrap.innerHTML=html;
    document.querySelectorAll(".item-checkbox").forEach(c=>c.style.display=editMode?"block":"none")
}
function openConfirmDialog(){
    const checked = document.querySelectorAll(".item-checkbox:checked");
    if(checked.length===0){
        document.getElementById("tipText").innerText="请勾选要删除的收藏";
        document.getElementById("tipModal").style.display="flex";
        return;
    }
    deleteTargetIdList = Array.from(checked).map(i=>parseInt(i.dataset.id));
    document.getElementById("confirmText").innerText=`确定删除${deleteTargetIdList.length}条收藏？`;
    document.getElementById("confirmModal").style.display="flex";
}
function closeConfirmModal(){document.getElementById("confirmModal").style.display="none";deleteTargetIdList=[]}
function closeTip(){document.getElementById("tipModal").style.display="none"}
async function executeDelete(){
    await fetch("/api/collect/batch_del",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:parseInt(loginUid),del_ids:deleteTargetIdList})
    })
    closeConfirmModal();
    toggleEditMode();
    await loadCollectData();
    document.getElementById("tipText").innerText="删除成功";
    document.getElementById("tipModal").style.display="flex";
}
async function loadHistoryData(){
    const res = await fetch("/api/search/list",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:parseInt(loginUid)})
    })
    const json = await res.json();
    allHistoryData = json.data;
    renderHistoryList();
}
function renderHistoryList(){
    const wrap = document.getElementById("historyBox");
    if(allHistoryData.length===0){
        wrap.innerHTML="<div class='empty-tip'>暂无起名记录</div>";return;
    }
    let html = "";
    allHistoryData.forEach((item,idx)=>{
        html += `<li class="history-item-li" onclick="openHistoryDetail(${idx})">
        <div>姓氏：${item.surname} | ${item.gender==='male'?'男':'女'}</div>
        <div>出生：${item.birth}</div>
        <div class="meta">生成时间：${item.create_time}</div>
        </li>`
    })
    wrap.innerHTML = html;
}
async function openHistoryDetail(index){
    const record = allHistoryData[index];
    const res = await fetch("/api/search/detail",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:parseInt(loginUid),record_id:record.id})
    })
    const ret = await res.json();
    const wrap = document.getElementById("historyModalContent");
    if(ret.code!==200){
        wrap.innerHTML=`<p style="color:red">${ret.msg}</p>`;
        document.getElementById("historyDetailModal").style.display="flex";
        return;
    }
    const d = ret.data;
    let html = `<h2 style="color:#0f4a8a">起名完整记录</h2>
    <div class="meta">姓氏：${d.surname} ${d.gender==='male'?'男宝':'女宝'} 生肖${d.zodiac} 时辰${d.time_period}</div>
    <div class="info-grid">
        <span class="tag">年柱${d.pillar_year}</span>
        <span class="tag">月柱${d.pillar_month}</span>
        <span class="tag">日柱${d.pillar_day}</span>
        <span class="tag">时柱${d.pillar_hour}</span>
    </div>
    <div class="meta">喜用神五行：${d.birth_element}</div>
    <div class="meta"><strong>八字分析：</strong>${d.balance}</div>
    <ul class="list">`;
    d.full_analysis.forEach(t=>html+=`<li>${t}</li>`)
    html += `</ul><h3>推荐名字</h3>`;
    d.suggestions.forEach(n=>{
        html += `<div class="suggestion"><h3>${n.name}</h3>
        <p>${n.meaning}</p>
        <p class="meta">标签：${n.source_tags.join("，")}</p></div>`
    })
    wrap.innerHTML=html;
    document.getElementById("historyDetailModal").style.display="flex";
}
function closeHistoryModal(){
    document.getElementById("historyDetailModal").style.display="none";
}
</script>
</body>
</html>
